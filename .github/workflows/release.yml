# .github/workflows/release.yml
# 태그 push 시 테스트 → exe 빌드 → MSI 인스톨러 빌드 → GitHub Release 배포

name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Test, Build & Release
    runs-on: windows-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 설치 ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # ── 3. 의존성 설치 ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
        shell: powershell

      # ── 4. 버전 추출 ────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver"
        shell: powershell

      # ── 5. config.py 버전 자동 주입 ─────────────────────────────
      - name: Inject version into config.py
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          (Get-Content config.py -Encoding UTF8) |
            ForEach-Object { $_ -replace '^CLIENT_VERSION\s*=\s*".*"', "CLIENT_VERSION = `"$ver`"" } |
            Set-Content config.py -Encoding UTF8
          Write-Host "Injected version: $ver"
          Get-Content config.py | Select-String "CLIENT_VERSION"
        shell: powershell

      # ── 6. GitHub Token 주입 ────────────────────────────────────────
      - name: Inject GitHub token into config.py
        run: |
          $token = "${{ secrets.GH_UPDATE_TOKEN }}"
          (Get-Content config.py -Encoding UTF8) |
            ForEach-Object { $_ -replace '^GITHUB_TOKEN\s*=\s*".*"', "GITHUB_TOKEN = `"$token`"" } |
            Set-Content config.py -Encoding UTF8
          Write-Host "GitHub token injected"
        shell: powershell

      # ── 6-1. Redis 비밀번호 주입 ─────────────────────────────────
      - name: Inject Redis password into config.py
        run: |
          $pw = "${{ secrets.REDIS_PASSWORD }}"
          (Get-Content config.py -Encoding UTF8) |
            ForEach-Object { $_ -replace '^REDIS_PASSWORD\s*=\s*".*"', "REDIS_PASSWORD = `"$pw`"" } |
            Set-Content config.py -Encoding UTF8
          Write-Host "Redis password injected"
        shell: powershell

      # ── 7. 테스트 실행 ───────────────────────────────────────────
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        shell: powershell

      # ── 7. exe 빌드 ─────────────────────────────────────────────
      - name: Build exe with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm
          Write-Host "PyInstaller build complete"
        shell: powershell

      # ── 8. 빌드 결과 확인 ────────────────────────────────────────
      - name: Verify build
        run: |
          Get-ChildItem -Path "dist" -Recurse | Select-Object FullName
          $exe = "dist\PCInspectClient\PCInspectClient.exe"
          $exists = Test-Path $exe
          Write-Host "exe exists: $exists"
          if (-not $exists) { exit 1 }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "exe size: $([math]::Round($size, 1)) MB"
        shell: powershell

      # ── 9. WiX Toolset 설치 ──────────────────────────────────────
      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix --version
        shell: powershell

      # ── 10. dist 파일 목록 wxs 자동 생성 ────────────────────────
      - name: Generate dist_files.wxs
        run: python generate_wxs.py
        shell: powershell

      # ── 11. MSI 빌드 ─────────────────────────────────────────────
      - name: Build MSI with WiX
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $wixVer = (wix --version).Trim()
          Write-Host "WiX version: $wixVer"
          wix extension add "WixToolset.UI.wixext/$wixVer"
          wix build installer.wxs dist_files.wxs `
            -ext WixToolset.UI.wixext `
            -arch x64 `
            -d AppVersion=$ver `
            -o "dist\PCInspectClient_$ver.msi"

          if (-not (Test-Path "dist\PCInspectClient_$ver.msi")) {
            Write-Error "MSI build failed"
            exit 1
          }
          $size = (Get-Item "dist\PCInspectClient_$ver.msi").Length / 1MB
          Write-Host "MSI size: $([math]::Round($size, 1)) MB"
        shell: powershell

      # ── 12. GitHub Release 생성 및 MSI 업로드 ───────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "PC Inspect Client ${{ steps.version.outputs.tag }}"
          body: |
            ## PC Inspect Client ${{ steps.version.outputs.tag }}

            ### 설치 방법
            1. `PCInspectClient_${{ steps.version.outputs.version }}.msi` 다운로드
            2. 관리자 권한으로 실행
            3. 설치 마법사 안내에 따라 진행
            4. 자동으로 `C:\Program Files\PCInspectClient\` 에 설치 + 서비스 등록/시작

            ### 제거 방법
            - 제어판 → 프로그램 추가/제거 → PC Inspect Client → 제거
            - 서비스 자동 중지 및 프로세스 종료 후 파일 삭제

            ### 변경 사항
            ${{ github.event.head_commit.message }}
          files: dist/PCInspectClient_${{ steps.version.outputs.version }}.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}